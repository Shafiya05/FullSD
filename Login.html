<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - EVConnect</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background:#f8fafc;
}

/* Header */
header{
    background:linear-gradient(90deg,#0f172a,#1e293b);
    color:white;
    padding:18px 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:30px;
    font-weight:bold;
    color:#8fde95;
}

nav ul{
    list-style:none;
    display:flex;
    gap:30px;
}

nav ul li a{
    text-decoration:none;
    color:white;
    font-weight:600;
}

nav ul li a:hover{
    color:#90a799;
}

/* Main Content */
main{
    width:450px;
    margin:50px auto;
}

section{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
    color:#0f172a;
    margin-bottom:25px;
    text-align:center;
}

/* Form */
form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

label{
    font-weight:bold;
    color:#334155;
}

input{
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

input:focus{
    outline:none;
    border-color:#8fde95;
}

/* Button */
.btn{
    background:linear-gradient(135deg,#4e6762,#83834a);
    color:white;
    padding:12px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.btn:hover{
    opacity:0.9;
}

/* Links */
.links{
    text-align:center;
    margin-top:15px;
}

.links p{
    margin-top:10px;
}

.links a{
    color:#4e6762;
    text-decoration:none;
    font-weight:bold;
}

.links a:hover{
    text-decoration:underline;
}

/* Footer */
footer{
    background:#0f172a;
    color:#cbd5e1;
    text-align:center;
    padding:20px;
    margin-top:50px;
}
</style>

</head>

<header>
    <h2 class="logo">⚡ EVConnect</h2>

    <nav>

        </ul>
    </nav>
</header>

</footer>

</html>
